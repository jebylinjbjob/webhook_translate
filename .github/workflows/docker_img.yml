name: Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 1 1,4,7,10 *" # 每季掃描：1月、4月、7月、10月 1日
  workflow_dispatch:

jobs:
  build-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Downcase repo name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 定期掃描：掃已發布的 image ──────────────────────────────
      - name: Run Trivy scanner on published image (scheduled)
        uses: aquasecurity/trivy-action@0.35.0
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        with:
          image-ref: ghcr.io/${{ env.REPO }}:latest
          format: "sarif"
          output: "trivy-docker-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to Security tab (scheduled)
        uses: github/codeql-action/upload-sarif@v4
        if: (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && always()
        with:
          sarif_file: "trivy-docker-results.sarif"

      - name: Run Trivy table output (scheduled)
        uses: aquasecurity/trivy-action@0.35.0
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        with:
          image-ref: ghcr.io/${{ env.REPO }}:latest
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      # ── 建置與掃描流程（push / PR）────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'

      - name: Get version info
        id: version
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="dev"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: docker-meta
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ env.REPO }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build for scanning (amd64 only)
        uses: docker/build-push-action@v7
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        with:
          context: .
          platforms: linux/amd64
          file: Dockerfile
          load: true
          tags: ${{ env.REPO }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy scanner on built image
        uses: aquasecurity/trivy-action@0.35.0
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        with:
          image-ref: ${{ env.REPO }}:scan
          format: "sarif"
          output: "trivy-docker-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: (github.event_name != 'schedule' && github.event_name != 'workflow_dispatch') && always()
        with:
          sarif_file: "trivy-docker-results.sarif"

      - name: Run Trivy table output
        uses: aquasecurity/trivy-action@0.35.0
        if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        with:
          image-ref: ${{ env.REPO }}:scan
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Build and push (multi-platform)
        uses: docker/build-push-action@v7
        if: github.event_name != 'pull_request' && github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          file: Dockerfile
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
