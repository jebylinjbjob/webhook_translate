name: ci pipeline

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: install just 
        run: curl -fsSL https://just.systems/install.sh | bash -s -- --to /usr/local/bin\
      - name: Run just ci
        run: just ci