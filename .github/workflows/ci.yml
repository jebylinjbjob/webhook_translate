name: CI

on:
  push:
    branches:
      - main
      - "cursor/**"
      - "feat/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Format check
        run: just fmt-check

      - name: Lint
        run: just lint
